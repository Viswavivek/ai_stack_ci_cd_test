name: AI CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ════════════════════════════════════════════════════════════
  # Stage 1 — Code Quality
  # ════════════════════════════════════════════════════════════
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5              # ← updated

      - name: Set up Python
        uses: actions/setup-python@v6          # ← updated
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v5                 # ← updated
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black mypy

      - name: Lint with flake8
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source
          flake8 src/ --count --max-line-length=100 --statistics

      - name: Format check with black
        run: black --check src/ tests/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true


  # ════════════════════════════════════════════════════════════
  # Stage 2 — Unit Tests
  # ════════════════════════════════════════════════════════════
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v5              # ← updated

      - name: Set up Python
        uses: actions/setup-python@v6          # ← updated
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          pytest tests/test_unit.py \
            -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/


  # ════════════════════════════════════════════════════════════
  # Stage 3 — AI Quality Tests
  # ════════════════════════════════════════════════════════════
  ai-quality-tests:
    name: AI Quality Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5              # ← updated

      - name: Set up Python
        uses: actions/setup-python@v6          # ← updated
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run AI quality tests
        env:
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          LANGCHAIN_API_KEY:    ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_PROJECT:    "CI-CD-Pipeline"
        run: |
          pytest tests/test_ai_quality.py \
            -v \
            --tb=short \
            -x

      - name: Upload AI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-results
          path: test-results/


  # ════════════════════════════════════════════════════════════
  # Stage 4 — Deploy
  # ════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, ai-quality-tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5              # ← updated

      - name: Deploy notification
        run: |
          echo "All quality gates passed!"
          echo "Code quality:    ✓"
          echo "Unit tests:      ✓"
          echo "AI quality:      ✓"
          echo "Deploying to production..."

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ All gates passed" >> $GITHUB_STEP_SUMMARY